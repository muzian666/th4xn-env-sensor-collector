<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #f4f6fb;
    --bg-card: #ffffff;
    --bg-card-hover: #f8f9fe;
    --border: #e2e6f0;
    --accent-blue: #3b6ef6;
    --accent-cyan: #0891b2;
    --accent-green: #10b981;
    --accent-orange: #f59e0b;
    --accent-red: #ef4444;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --glow-blue: rgba(59, 110, 246, 0.12);
    --glow-cyan: rgba(8, 145, 178, 0.12);
    --glow-green: rgba(16, 185, 129, 0.12);
    --glow-red: rgba(239, 68, 68, 0.15);
  }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(59,110,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,110,246,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header h1 span {
    color: var(--accent-blue);
    font-weight: 600;
  }
  .header .status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  .header .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 0 0 var(--glow-green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 var(--glow-green); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }

  /* Sensor Cards Grid */
  .sensor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .sensor-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .sensor-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  /* Animated gradient border */
  .sensor-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 17px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan), var(--accent-blue));
    background-size: 400% 400%;
    animation: gradient-border 4s ease infinite;
    z-index: -1;
    opacity: 0.25;
  }
  .sensor-card.alert::before {
    background: linear-gradient(135deg, var(--accent-red), var(--accent-orange), var(--accent-red));
    animation-duration: 1.5s;
    opacity: 0.8;
  }
  @keyframes gradient-border {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .sensor-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .sensor-card .device-name-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sensor-card .device-name {
    font-size: 1rem;
    color: var(--text-primary);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .sensor-card .device-id-sub {
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 1px;
    font-family: monospace;
  }
  .sensor-card .edit-name-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding: 0;
  }
  .sensor-card .edit-name-btn:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }
  .sensor-card .name-input {
    background: #ffffff;
    border: 1px solid var(--accent-blue);
    color: var(--text-primary);
    font-size: 1rem;
    padding: 4px 10px;
    border-radius: 6px;
    outline: none;
    width: 200px;
    font-weight: 500;
    box-shadow: 0 0 0 3px var(--glow-blue);
  }
  .sensor-card .alert-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: none;
  }
  .sensor-card.alert .alert-badge {
    display: inline-block;
    background: rgba(239,68,68,0.1);
    color: var(--accent-red);
    border: 1px solid rgba(239,68,68,0.3);
    animation: pulse-badge 1.5s infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .sensor-values {
    display: flex;
    gap: 32px;
    align-items: flex-end;
  }
  .value-block {
    flex: 1;
  }
  .value-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .value-display {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .value-number {
    font-size: 3rem;
    font-weight: 200;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s ease;
  }
  .value-unit {
    font-size: 1.2rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .temp-value .value-number { color: var(--accent-cyan); }
  .hum-value .value-number { color: var(--accent-blue); }
  .stat-item .stat-val.high { color: #ef4444; }
  .stat-item .stat-val.low { color: var(--accent-cyan); }
  .stat-item .stat-val.avg { color: var(--accent-green); }

  /* Stats row under values */
  .stats-row {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .stat-item {
    flex: 1;
    text-align: center;
  }
  .stat-item .stat-label {
    font-size: 0.65rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-item .stat-val {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  /* Charts Section */
  .charts-section {
    margin-bottom: 32px;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chart-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chart-controls select, .chart-controls button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chart-controls select:hover, .chart-controls button:hover {
    border-color: var(--accent-blue);
  }
  .chart-controls button.active {
    background: rgba(59,110,246,0.1);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .chart-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .chart-card h3 {
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Alert Config */
  .alert-section {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .alert-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .alert-device {
    background: #f4f6fb;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--border);
  }
  .alert-device h4 {
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .alert-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .alert-field label {
    display: block;
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .alert-field input {
    width: 100%;
    background: #ffffff;
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  .alert-field input:focus {
    outline: none;
    border-color: var(--accent-blue);
  }
  .save-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }
  .save-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--glow-blue);
    color: #fff;
  }

  /* Last updated */
  .last-updated {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-align: right;
    margin-top: 8px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .sensor-grid { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .sensor-values { flex-direction: column; gap: 16px; }
    .value-number { font-size: 2.4rem; }
  }

  /* Fade-in animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .sensor-card, .chart-card, .alert-section {
    animation: fadeInUp 0.6s ease forwards;
  }
  .sensor-card:nth-child(2) { animation-delay: 0.1s; }
  .chart-card:nth-child(2) { animation-delay: 0.2s; }

  /* Number transition glow */
  .value-number.updating {
    text-shadow: 0 0 20px currentColor;
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1><span>ENV</span> Sensor Monitor</h1>
    <div class="status">
      <div class="dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <!-- Sensor Cards -->
  <div class="sensor-grid" id="sensor-grid"></div>

  <!-- Charts -->
  <div class="charts-section">
    <div class="section-title">Historical Trends</div>
    <div class="chart-controls">
      <select id="chart-device"></select>
      <button class="active" data-hours="6">6H</button>
      <button data-hours="24">24H</button>
      <button data-hours="72">3D</button>
      <button data-hours="168">7D</button>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Temperature (&deg;C)</h3>
        <canvas id="temp-chart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Humidity (%RH)</h3>
        <canvas id="hum-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Alert Config -->
  <div class="alert-section">
    <div class="section-title">Alert Configuration</div>
    <div class="alert-grid" id="alert-grid"></div>
    <button class="save-btn" id="save-alerts">Save Configuration</button>
  </div>

  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const API = '';
let devices = [];      // [{device_id, name}, ...]
let deviceMap = {};    // device_id -> name
let currentDevice = null;
let chartHours = 6;
let tempChart = null;
let humChart = null;
let previousValues = {};

// ── API helpers ──
async function api(path) {
  const r = await fetch(API + path);
  return r.json();
}

// ── Render sensor cards ──
async function refreshSensors() {
  const readings = await api('/api/latest');
  const grid = document.getElementById('sensor-grid');

  readings.forEach(r => {
    let card = document.getElementById('card-' + r.device_id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + r.device_id;
      card.className = 'sensor-card';
      card.innerHTML = buildCardHTML(r.device_id);
      grid.appendChild(card);
    }

    // Update values with animation
    const tc = r.temperature_c ?? '--';
    const hum = r.humidity ?? '--';
    animateValue(card.querySelector('.temp-val'), tc);
    animateValue(card.querySelector('.hum-val'), hum);
    card.querySelector('.card-ts').textContent = r.timestamp;

    // Update nickname if changed
    const nameEl = card.querySelector('.device-name');
    if (nameEl && r.device_name && nameEl.textContent !== r.device_name) {
      nameEl.textContent = r.device_name;
    }

    // Alert state
    card.classList.toggle('alert', r.alert_status !== 'normal');
    card.querySelector('.alert-badge').style.display =
      r.alert_status !== 'normal' ? 'inline-block' : 'none';
  });

  document.getElementById('status-text').textContent =
    `${readings.length} sensor${readings.length !== 1 ? 's' : ''} online`;
  document.getElementById('last-updated').textContent =
    'Last updated: ' + new Date().toLocaleTimeString();
}

function buildCardHTML(deviceId) {
  const name = deviceMap[deviceId] || '';
  return `
    <div class="card-header">
      <div class="device-name-wrap">
        <span class="device-name">${name || deviceId}</span>
        ${name ? '<span class="device-id-sub">' + deviceId + '</span>' : ''}
        <button class="edit-name-btn" onclick="editDeviceName('${deviceId}')" title="Rename">&#9998;</button>
      </div>
      <span class="alert-badge">ALERT</span>
    </div>
    <div class="sensor-values">
      <div class="value-block temp-value">
        <div class="value-label">Temperature</div>
        <div class="value-display">
          <span class="value-number temp-val">--</span>
          <span class="value-unit">&deg;C</span>
        </div>
      </div>
      <div class="value-block hum-value">
        <div class="value-label">Humidity</div>
        <div class="value-display">
          <span class="value-number hum-val">--</span>
          <span class="value-unit">%RH</span>
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-label">Avg Temp</div><div class="stat-val avg stats-tavg">--</div></div>
      <div class="stat-item"><div class="stat-label">Min Temp</div><div class="stat-val low stats-tmin">--</div></div>
      <div class="stat-item"><div class="stat-label">Max Temp</div><div class="stat-val high stats-tmax">--</div></div>
      <div class="stat-item"><div class="stat-label">Avg Hum</div><div class="stat-val avg stats-havg">--</div></div>
      <div class="stat-item"><div class="stat-label">Min Hum</div><div class="stat-val low stats-hmin">--</div></div>
      <div class="stat-item"><div class="stat-label">Max Hum</div><div class="stat-val high stats-hmax">--</div></div>
    </div>
    <div class="last-updated card-ts">--</div>
  `;
}

function editDeviceName(deviceId) {
  const card = document.getElementById('card-' + deviceId);
  const wrap = card.querySelector('.device-name-wrap');
  const current = deviceMap[deviceId] || '';

  // Replace content with input
  const save = wrap.querySelector('.edit-name-btn');
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = current;
  input.placeholder = 'Enter room name...';

  // Remove old elements, keep save button
  const nameEl = wrap.querySelector('.device-name');
  const idEl = wrap.querySelector('.device-id-sub');
  if (nameEl) nameEl.remove();
  if (idEl) idEl.remove();
  wrap.insertBefore(input, save);
  input.focus();
  input.select();

  const finish = async () => {
    const newName = input.value.trim();
    if (newName && newName !== current) {
      await fetch(API + '/api/device-name', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: deviceId, name: newName }),
      });
      deviceMap[deviceId] = newName;
    }
    // Re-render card header
    const span = document.createElement('span');
    span.className = 'device-name';
    span.textContent = deviceMap[deviceId] || deviceId;
    input.replaceWith(span);
    if (deviceMap[deviceId]) {
      const sub = document.createElement('span');
      sub.className = 'device-id-sub';
      sub.textContent = deviceId;
      wrap.insertBefore(sub, save);
    }
    updateChartSelector();
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { input.value = current; finish(); }
  });
  input.addEventListener('blur', finish);
}

function animateValue(el, newVal) {
  if (newVal === '--' || newVal === null) {
    el.textContent = '--';
    return;
  }
  const old = parseFloat(el.textContent);
  if (isNaN(old) || Math.abs(old - newVal) > 5) {
    el.textContent = newVal.toFixed(1);
  } else {
    el.classList.add('updating');
    const steps = 10;
    const diff = newVal - old;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      el.textContent = (old + diff * (step / steps)).toFixed(1);
      if (step >= steps) {
        clearInterval(interval);
        el.textContent = newVal.toFixed(1);
        setTimeout(() => el.classList.remove('updating'), 200);
      }
    }, 30);
  }
}

// ── Stats ──
async function refreshStats() {
  for (const dev of devices) {
    try {
      const s = await api(`/api/stats?device_id=${dev.device_id}&hours=24`);
      const card = document.getElementById('card-' + dev.device_id);
      if (!card) continue;
      card.querySelector('.stats-tavg').textContent = s.avg_temp != null ? s.avg_temp + '\u00B0' : '--';
      card.querySelector('.stats-tmin').textContent = s.min_temp != null ? s.min_temp + '\u00B0' : '--';
      card.querySelector('.stats-tmax').textContent = s.max_temp != null ? s.max_temp + '\u00B0' : '--';
      card.querySelector('.stats-havg').textContent = s.avg_humidity != null ? s.avg_humidity + '%' : '--';
      card.querySelector('.stats-hmin').textContent = s.min_humidity != null ? s.min_humidity + '%' : '--';
      card.querySelector('.stats-hmax').textContent = s.max_humidity != null ? s.max_humidity + '%' : '--';
    } catch(e) {}
  }
}

// ── Charts ──
const chartDefaults = {
  responsive: true,
  maintainAspectRatio: true,
  aspectRatio: 2.2,
  interaction: { intersect: false, mode: 'index' },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#ffffffee',
      borderColor: '#e2e6f0',
      borderWidth: 1,
      titleColor: '#64748b',
      bodyColor: '#1e293b',
      cornerRadius: 8,
      padding: 10,
    }
  },
  scales: {
    x: {
      type: 'time' in Chart ? 'time' : 'category',
      grid: { color: 'rgba(59,110,246,0.08)' },
      ticks: { color: '#7986cb', maxTicksLimit: 10, font: { size: 10 } },
    },
    y: {
      grid: { color: 'rgba(59,110,246,0.08)' },
      ticks: { color: '#64748b', font: { size: 10 } },
    }
  },
  elements: {
    point: { radius: 0, hoverRadius: 4 },
    line: { tension: 0.4, borderWidth: 2 },
  },
};

function createCharts() {
  tempChart = new Chart(document.getElementById('temp-chart'), {
    type: 'line',
    data: { labels: [], datasets: [{
      data: [],
      borderColor: '#0891b2',
      backgroundColor: 'rgba(8,145,178,0.08)',
      fill: true,
    }]},
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '\u00B0C' } }
      }
    }
  });
  humChart = new Chart(document.getElementById('hum-chart'), {
    type: 'line',
    data: { labels: [], datasets: [{
      data: [],
      borderColor: '#3b6ef6',
      backgroundColor: 'rgba(59,110,246,0.06)',
      fill: true,
    }]},
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '%' } }
      }
    }
  });
}

async function refreshChart() {
  if (!currentDevice) return;
  const data = await api(`/api/history?device_id=${currentDevice}&hours=${chartHours}`);
  const labels = data.map(d => {
    const t = d.timestamp;
    return chartHours <= 24
      ? t.slice(11, 16)
      : t.slice(5, 10) + ' ' + t.slice(11, 16);
  });
  tempChart.data.labels = labels;
  tempChart.data.datasets[0].data = data.map(d => d.temperature_c);
  tempChart.update('none');

  humChart.data.labels = labels;
  humChart.data.datasets[0].data = data.map(d => d.humidity);
  humChart.update('none');
}

// ── Alert Config ──
async function loadAlerts() {
  const alerts = await api('/api/alerts');
  const grid = document.getElementById('alert-grid');
  grid.innerHTML = '';

  // Build form for each known device
  const allDevs = devices.length ? devices.map(d => d.device_id) : (alerts.map(a => a.device_id));
  for (const dev of allDevs) {
    const cfg = alerts.find(a => a.device_id === dev) || {
      device_id: dev, temp_low: 15, temp_high: 35, humidity_low: 20, humidity_high: 80
    };
    const displayName = deviceMap[dev] || dev;
    const div = document.createElement('div');
    div.className = 'alert-device';
    div.innerHTML = `
      <h4>${displayName}</h4>
      <div class="alert-fields">
        <div class="alert-field">
          <label>Temp Low (&deg;C)</label>
          <input type="number" step="0.1" data-field="temp_low" value="${cfg.temp_low}">
        </div>
        <div class="alert-field">
          <label>Temp High (&deg;C)</label>
          <input type="number" step="0.1" data-field="temp_high" value="${cfg.temp_high}">
        </div>
        <div class="alert-field">
          <label>Humidity Low (%)</label>
          <input type="number" step="0.1" data-field="humidity_low" value="${cfg.humidity_low}">
        </div>
        <div class="alert-field">
          <label>Humidity High (%)</label>
          <input type="number" step="0.1" data-field="humidity_high" value="${cfg.humidity_high}">
        </div>
      </div>
    `;
    div.dataset.device = dev;
    grid.appendChild(div);
  }
}

document.getElementById('save-alerts').addEventListener('click', async () => {
  const devices_divs = document.querySelectorAll('.alert-device');
  for (const div of devices_divs) {
    const dev = div.dataset.device;
    const body = { device_id: dev };
    div.querySelectorAll('input').forEach(inp => {
      body[inp.dataset.field] = parseFloat(inp.value);
    });
    await fetch(API + '/api/alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  }
  // Flash save button
  const btn = document.getElementById('save-alerts');
  btn.textContent = 'Saved!';
  btn.style.background = 'linear-gradient(135deg, #00e676, #00e5ff)';
  setTimeout(() => { btn.textContent = 'Save Configuration'; btn.style.background = ''; }, 1500);
});

// ── Chart Controls ──
document.querySelectorAll('.chart-controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chart-controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chartHours = parseInt(btn.dataset.hours);
    refreshChart();
  });
});

document.getElementById('chart-device').addEventListener('change', (e) => {
  currentDevice = e.target.value;
  refreshChart();
});

// ── Init ──
function updateChartSelector() {
  const sel = document.getElementById('chart-device');
  const prev = sel.value;
  sel.innerHTML = '';
  devices.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.device_id;
    opt.textContent = deviceMap[d.device_id] || d.device_id;
    sel.appendChild(opt);
  });
  if (prev && devices.some(d => d.device_id === prev)) {
    sel.value = prev;
    currentDevice = prev;
  }
}

async function init() {
  createCharts();
  devices = await api('/api/devices');
  deviceMap = {};
  devices.forEach(d => { if (d.name) deviceMap[d.device_id] = d.name; });

  updateChartSelector();
  if (devices.length) {
    currentDevice = devices[0].device_id;
  }

  await refreshSensors();
  await refreshStats();
  await refreshChart();
  await loadAlerts();

  // Auto-refresh
  setInterval(refreshSensors, 10000);
  setInterval(refreshStats, 60000);
  setInterval(refreshChart, 30000);
}

init().catch(e => console.error('Init failed:', e));
</script>
